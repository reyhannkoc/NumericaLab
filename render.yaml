services:
  # ── Backend — Python Web Service ────────────────────────────────────────────
  - type: web
    name: numericalab-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: MAX_ITERATIONS
        value: 1000
      - key: DEFAULT_TOLERANCE
        value: 1e-8
      - key: FUNCTION_EVAL_TIMEOUT
        value: 5

  # ── Frontend — Static Site ───────────────────────────────────────────────────
  - type: web
    name: numericalab
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        # Replace with your actual Render backend URL after first deploy.
        value: https://numericalab-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
